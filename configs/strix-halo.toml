# Tracked benchmark config for the strix-halo box (gfx1151, ROCm 7.2.0).
# Tracked (unlike configs/models.toml) so edits reach the box via `git pull`.
# Run: python3 -m strixbench run --config configs/strix-halo.toml

engine = "llama.cpp"

[runners."llama.cpp"]
binary = "/home/ai/llama.cpp/build/bin/llama-bench"

[runners.ollama]
host = "http://127.0.0.1:11434"

[defaults]
backend = "rocm"
n_ctx = 4096
n_prompt = 512
n_gen = 128
n_gpu_layers = 999
n_batch = 2048
reps = 3

# gemma-4-26B-A4B MoE (26B total / ~4B active) — ROCm vs Ollama
[[models]]
name = "gemma-4-26B-A4B-heretic"
path = "/home/ai/models/gemma-4-26B-A4B-it-heretic-Q4-GGUF/gemma-4-26B-A4B-it-heretic.Q4_K_M.gguf"
quant = "Q4_K_M"
is_moe = true
[[models]]
name = "gemma-4-26B-A4B-heretic"
engine = "ollama"
tag = "gemma-4-26b-a4b-it-heretic-q4-gguf:latest"
quant = "Q4_K_M"
is_moe = true

